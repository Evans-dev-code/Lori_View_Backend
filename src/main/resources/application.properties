spring.config.import=optional:file:.env[.properties]

spring.application.name=loriview
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# M-Pesa Daraja API
mpesa.consumer.key=${MPESA_CONSUMER_KEY}
mpesa.consumer.secret=${MPESA_CONSUMER_SECRET}
mpesa.shortcode=${MPESA_SHORTCODE}
mpesa.passkey=${MPESA_PASSKEY}

# Sandbox URLs
mpesa.auth.url=https://sandbox.safaricom.co.ke/oauth/v1/generate?grant_type=client_credentials
mpesa.stk.push.url=https://sandbox.safaricom.co.ke/mpesa/stkpush/v1/processrequest
mpesa.callback.url=${MPESA_CALLBACK_URL}
mpesa.stk.query.url=${MPESA_STK_QUERY_URL}

# Hikari Connection Pool settings for Free Tier DB
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1